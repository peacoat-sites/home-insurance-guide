baseURL = "https://homeinsuranceclear.com/"
languageCode = "en-us"
title = "Home Insurance Clear"
[pagination]
  pagerSize = 12
enableRobotsTXT = true
enableEmoji = true

[params]
  description = "Honest, jargon-free guides to homeowners insurance coverage, costs, claims, and how to get the best protection for your home."
  niche = "Home Insurance Education"
  adsense_id = "ca-pub-3466203197759215"
  adsense_slot_header = "SLOT_HOME_HEADER"
  adsense_slot_incontent = "SLOT_HOME_INCONTENT"
  adsense_slot_sidebar = "SLOT_HOME_SIDEBAR"
  image_query = "home insurance house protection family coverage"
  author = "Home Insurance Clear Editorial Team"
  logo_text = "Home Insurance Clear"
  tagline = "Clear answers about home insurance — coverage explained in plain English"
  primary_color = "#1a2744"
  cloudflare_analytics = ""

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  priority = 0.5
  filename = "sitemap.xml"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[permalinks]
  posts = "/:slug/"
